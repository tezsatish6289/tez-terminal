# Optimized for Singapore (asia-southeast1) Deployment
runConfig:
  maxInstances: 3
  minInstances: 0
  memoryMiB: 512
  # Increase timeout for video/heavy sync operations if needed
  timeoutSeconds: 60

env:
  - variable: NODE_ENV
    value: production
  - variable: NEXT_PUBLIC_REGION
    value: asia-southeast1
