# Optimized for Singapore (asia-southeast1) Deployment
runConfig:
  maxInstances: 3
  minInstances: 1
  memoryMiB: 1024
  timeoutSeconds: 120

env:
  - variable: NODE_ENV
    value: production
  - variable: NEXT_PUBLIC_REGION
    value: asia-southeast1
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-9SSXWJTR1L
  - variable: TELEGRAM_BOT_TOKEN
    secret: TELEGRAM_BOT_TOKEN
    availability:
      - RUNTIME
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
  - variable: NOWPAYMENTS_API_KEY
    secret: NOWPAYMENTS_API_KEY
    availability:
      - RUNTIME
  - variable: NOWPAYMENTS_IPN_SECRET
    secret: NOWPAYMENTS_IPN_SECRET
    availability:
      - RUNTIME
  - variable: TWITTER_CLIENT_ID
    secret: TWITTER_CLIENT_ID
    availability:
      - RUNTIME
  - variable: TWITTER_CLIENT_SECRET
    secret: TWITTER_CLIENT_SECRET
    availability:
      - RUNTIME
  - variable: GOOGLE_GENAI_API_KEY
    secret: GOOGLE_GENAI_API_KEY
    availability:
      - RUNTIME
  - variable: ENCRYPTION_KEY
    secret: ENCRYPTION_KEY
    availability:
      - RUNTIME
  - variable: DHAN_ACCESS_TOKEN
    secret: DHAN_ACCESS_TOKEN
    availability:
      - RUNTIME
  - variable: DHAN_CLIENT_ID
    secret: DHAN_CLIENT_ID
    availability:
      - RUNTIME
  - variable: SOLANA_RPC_URL
    secret: SOLANA_RPC_URL
    availability:
      - RUNTIME
  - variable: SOLANA_PRIVATE_KEY
    secret: SOLANA_PRIVATE_KEY
    availability:
      - RUNTIME
  - variable: LIQUIDITY_WS_SECRET
    secret: LIQUIDITY_WS_SECRET
    availability:
      - RUNTIME